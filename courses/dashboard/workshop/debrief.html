<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debrief | AutoNateAI Workshop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../../shared/js/theme-loader.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #12121a; --bg3: #16162a;
      --text: #e8e8f0; --text2: #a0a0b8; --muted: #6a6a80;
      --purple: #ab47bc; --blue: #7986cb; --teal: #4db6ac;
      --green: #66bb6a; --yellow: #ffd54f; --red: #ef5350; --orange: #ff8a65;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    #auth-loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 1rem; }
    #auth-loading.hidden { display: none; }
    .spin { width: 36px; height: 36px; border: 3px solid rgba(239,83,80,0.3); border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #lecture-shell { display: none; height: 100vh; flex-direction: column; }
    #lecture-shell.ready { display: flex; }

    .lec-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: rgba(10,10,15,0.95); border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; backdrop-filter: blur(8px); }
    .lec-bar__back { color: var(--text2); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; transition: color .2s; }
    .lec-bar__back:hover { color: var(--text); }
    .lec-bar__title { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .lec-bar__right { display: flex; align-items: center; gap: 1rem; }
    .lec-bar__section { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .lec-bar__count { font-size: 0.8rem; color: var(--text2); font-family: 'Space Grotesk', sans-serif; }

    .lec-progress { height: 3px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
    .lec-progress__fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--orange)); transition: width .4s cubic-bezier(.4,0,.2,1); }

    .lec-stage { flex: 1; overflow: hidden; position: relative; }
    #slide-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .lec-nav { display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 1rem 1.5rem; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .lec-nav__btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: 10px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: var(--text2); transition: all .2s; }
    .lec-nav__btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
    .lec-nav__btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
    .lec-nav__btn.primary:hover { opacity: .85; }
    .lec-nav__btn:disabled { opacity: .3; cursor: default; }
    .lec-nav__dots { display: flex; gap: 0.4rem; align-items: center; }
    .lec-nav__dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; transition: all .2s; }
    .lec-nav__dot.active { background: var(--red); transform: scale(1.3); }
    .lec-nav__dot.done { background: rgba(239,83,80,0.4); }

    .slide { max-width: 820px; width: 100%; }

    /* You Built This */
    .slide--built { text-align: center; }
    .built-eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }
    .built-main { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 800; color: var(--text); line-height: 1.05; margin-bottom: 0.5rem; }
    .built-sub { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1rem, 2.5vw, 1.5rem); font-weight: 600; color: var(--text2); margin-bottom: 1.75rem; }
    .built-note { font-size: 0.88rem; color: var(--muted); font-style: italic; }

    /* Shipped stack */
    .slide--shipped .headline { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
    .shipped-stack { display: flex; flex-direction: column; gap: 0.55rem; }
    .shipped-layer { display: flex; align-items: flex-start; gap: 1rem; background: var(--bg3); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 0.875rem 1.1rem; }
    .shipped-layer__icon { font-size: 1.4rem; flex-shrink: 0; }
    .shipped-layer__title { font-family: 'Space Grotesk', sans-serif; font-size: 0.83rem; font-weight: 600; color: var(--text); margin-bottom: 0.15rem; }
    .shipped-layer__desc { font-size: 0.76rem; color: var(--muted); }

    /* Mapper recap */
    .slide--mapper-recap .headline { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
    .slide--mapper-recap .sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 1.25rem; }
    .mapper-recap-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .mapper-recap-card { background: var(--bg3); border: 1px solid rgba(171,71,188,0.12); border-radius: 12px; padding: 1rem; }
    .mapper-recap-card__char { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 800; color: var(--purple); }
    .mapper-recap-card__word { font-size: 0.65rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.5rem; }
    .mapper-recap-card__example { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }

    /* Monday */
    .slide--monday .headline { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
    .slide--monday .sub { font-size: 0.88rem; color: var(--text2); margin-bottom: 1.25rem; }
    .monday-list { display: flex; flex-direction: column; gap: 0.55rem; }
    .monday-item { display: flex; align-items: flex-start; gap: 0.875rem; padding: 0.875rem 1rem; background: var(--bg3); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
    .monday-item__num { font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--blue); background: rgba(121,134,203,0.1); border: 1px solid rgba(121,134,203,0.2); border-radius: 6px; padding: 0.2rem 0.5rem; flex-shrink: 0; }
    .monday-item__text { font-size: 0.875rem; color: var(--text2); line-height: 1.5; }
    .monday-item__text strong { color: var(--text); }

    /* Closing */
    .slide--closing { text-align: center; }
    .closing-big { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.75rem, 4.5vw, 3rem); font-weight: 800; color: var(--text); line-height: 1.15; margin-bottom: 0.4rem; }
    .closing-sub { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 700; color: var(--purple); margin-bottom: 1.75rem; }
    .closing-recap { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 2rem; }
    .closing-recap__item { background: rgba(171,71,188,0.08); border: 1px solid rgba(171,71,188,0.2); border-radius: 8px; padding: 0.45rem 0.875rem; font-size: 0.8rem; color: var(--text2); }
    .closing-cta { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--purple); color: #fff; padding: 0.875rem 2rem; border-radius: 12px; font-weight: 600; font-size: 0.95rem; text-decoration: none; transition: opacity .2s; }
    .closing-cta:hover { opacity: .85; }
  </style>
</head>
<body>

<div id="auth-loading">
  <div style="font-size:2rem;margin-bottom:.5rem;">⬆️</div>
  <div class="spin"></div>
</div>

<div id="lecture-shell">
  <div class="lec-bar">
    <a href="../workshop.html" class="lec-bar__back">← Workshop</a>
    <span class="lec-bar__title">Module 07 — Debrief</span>
    <div class="lec-bar__right">
      <span class="lec-bar__section" id="bar-section"></span>
      <span class="lec-bar__count" id="bar-count">1 / 5</span>
    </div>
  </div>
  <div class="lec-progress"><div class="lec-progress__fill" id="progress-fill"></div></div>
  <div class="lec-stage"><div id="slide-wrap"></div></div>
  <nav class="lec-nav">
    <button class="lec-nav__btn" id="btn-prev" onclick="go(-1)">← Prev</button>
    <div class="lec-nav__dots" id="nav-dots"></div>
    <button class="lec-nav__btn primary" id="btn-next" onclick="go(1)">Next →</button>
  </nav>
</div>

<script src="../../shared/js/firebase-config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script>

const SLIDES = [
  {
    id: 's01', type: 'built', section: null,
    data: {
      eyebrow: 'Module 07 · Debrief',
      main: 'You built\nthis.',
      sub: '3 Python files → Full-stack AI prediction app. 3.5 hours.',
      note: 'Let that land for a second.'
    }
  },
  {
    id: 's02', type: 'shipped', section: 'What You Shipped',
    data: {
      headline: 'The stack you built from scratch.',
      layers: [
        { icon: '⚙️', title: 'FastAPI Backend', desc: 'GET /games/today · POST /predict · GET /predictions — fully documented REST API' },
        { icon: '🧠', title: 'Anthropic Claude Predictions', desc: 'Structured output: winner, confidence, reasoning, key_factors — typed with Pydantic' },
        { icon: '📊', title: 'Live NBA Data', desc: 'The Odds API integration — real games, real lines, refreshed daily — no more hardcoded data' },
        { icon: '🖥️', title: 'Frontend (Your Choice)', desc: 'React / plain HTML / Streamlit — wired end-to-end to the prediction API' },
        { icon: '🚀', title: 'Deployed', desc: 'Live URL — Vercel + Railway / Streamlit Cloud — anyone can access it right now' },
      ]
    }
  },
  {
    id: 's03', type: 'mapper-recap', section: 'The Framework',
    data: {
      headline: 'M.A.P.P.E.R.',
      sub: 'You ran it every single build. Here\'s what it looked like in practice.',
      cards: [
        { char: 'M', word: 'Map', example: 'You opened nba_bot.py — 3 classes, 1 entry point — before writing a single line of new code.' },
        { char: 'A', word: 'Analyze', example: 'You found fetch_today_games() returning hardcoded data. That was the gap. You named it before prompting.' },
        { char: 'P', word: 'Prompt', example: 'You loaded architecture context into every Claude prompt — never asked cold.' },
        { char: 'P', word: 'Preview', example: 'You read every diff before accepting it. You caught scope creep. That\'s the whole game.' },
        { char: 'E', word: 'Execute', example: 'You applied only what you asked for — no surprise imports, no renamed variables you didn\'t plan.' },
        { char: 'R', word: 'Review', example: 'Preflight before every commit. Production-ready habits from day one.' },
      ]
    }
  },
  {
    id: 's04', type: 'monday', section: 'What\'s Next',
    data: {
      headline: 'Monday morning. New codebase. Same loop.',
      sub: 'Five moves. Every project. Every time.',
      items: [
        { num: '01', text: '<strong>Find the entry point</strong> before you read anything else. That\'s your anchor.' },
        { num: '02', text: '<strong>Answer the 3 questions:</strong> what does it do / what does it touch / what could break?' },
        { num: '03', text: '<strong>Load the architecture context</strong> into every Claude prompt — never ask cold.' },
        { num: '04', text: '<strong>Read the diff, every line,</strong> before accepting any AI output.' },
        { num: '05', text: '<strong>Run the Preflight</strong> before every commit to main.' },
      ]
    }
  },
  {
    id: 's05', type: 'closing', section: null,
    data: {
      big: 'The gap between good and great engineers isn\'t skill.',
      sub: 'It\'s the loop.',
      recap: ['Entry point first', 'Context = output quality', 'Fork every diff', 'Preflight every commit'],
    }
  }
];

let current = 0;

function renderSlide(idx) {
  const s = SLIDES[idx];
  document.getElementById('slide-wrap').innerHTML = slideHTML(s);
  updateBar(idx);
  anime({
    targets: '#slide-wrap > .slide > *',
    opacity: [0, 1], translateY: [18, 0],
    delay: anime.stagger(70), easing: 'easeOutCubic', duration: 380
  });
}

function slideHTML(s) {
  switch (s.type) {
    case 'built':        return builtHTML(s.data);
    case 'shipped':      return shippedHTML(s.data);
    case 'mapper-recap': return mapperRecapHTML(s.data);
    case 'monday':       return mondayHTML(s.data);
    case 'closing':      return closingHTML(s.data);
    default: return `<div class="slide"><p>${s.id}</p></div>`;
  }
}

function builtHTML(d) {
  const lines = d.main.split('\n').join('<br>');
  return `<div class="slide slide--built">
    <div class="built-eyebrow">${d.eyebrow}</div>
    <div class="built-main">${lines}</div>
    <div class="built-sub">${d.sub}</div>
    <div class="built-note">${d.note}</div>
  </div>`;
}

function shippedHTML(d) {
  const layers = d.layers.map(l => `
    <div class="shipped-layer">
      <div class="shipped-layer__icon">${l.icon}</div>
      <div>
        <div class="shipped-layer__title">${l.title}</div>
        <div class="shipped-layer__desc">${l.desc}</div>
      </div>
    </div>`).join('');
  return `<div class="slide slide--shipped">
    <div class="headline">${d.headline}</div>
    <div class="shipped-stack">${layers}</div>
  </div>`;
}

function mapperRecapHTML(d) {
  const cards = d.cards.map(c => `
    <div class="mapper-recap-card">
      <div class="mapper-recap-card__char">${c.char}</div>
      <div class="mapper-recap-card__word">${c.word}</div>
      <div class="mapper-recap-card__example">${c.example}</div>
    </div>`).join('');
  return `<div class="slide slide--mapper-recap">
    <div class="headline">${d.headline}</div>
    <div class="sub">${d.sub}</div>
    <div class="mapper-recap-grid">${cards}</div>
  </div>`;
}

function mondayHTML(d) {
  const items = d.items.map(i => `
    <div class="monday-item">
      <div class="monday-item__num">${i.num}</div>
      <div class="monday-item__text">${i.text}</div>
    </div>`).join('');
  return `<div class="slide slide--monday">
    <div class="headline">${d.headline}</div>
    <div class="sub">${d.sub}</div>
    <div class="monday-list">${items}</div>
  </div>`;
}

function closingHTML(d) {
  const recap = d.recap.map(r => `<div class="closing-recap__item">✓ ${r}</div>`).join('');
  return `<div class="slide slide--closing">
    <div class="closing-big">${d.big}</div>
    <div class="closing-sub">${d.sub}</div>
    <div class="closing-recap">${recap}</div>
    <a href="../workshop.html" class="closing-cta">← Back to Workshop</a>
  </div>`;
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= SLIDES.length) return;
  anime({
    targets: '#slide-wrap > .slide',
    opacity: [1, 0], translateX: [0, dir * -40],
    easing: 'easeInCubic', duration: 200,
    complete() {
      current = next;
      renderSlide(current);
      anime({ targets: '#slide-wrap > .slide', opacity: [0, 1], translateX: [dir * 40, 0], easing: 'easeOutCubic', duration: 280 });
    }
  });
}

function updateBar(idx) {
  const s = SLIDES[idx];
  document.getElementById('progress-fill').style.width = ((idx + 1) / SLIDES.length * 100) + '%';
  document.getElementById('bar-count').textContent = `${idx + 1} / ${SLIDES.length}`;
  document.getElementById('bar-section').textContent = s.section || '';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === SLIDES.length - 1 ? 'Back to Workshop' : 'Next →';
  if (idx === SLIDES.length - 1) {
    document.getElementById('btn-next').onclick = () => { window.location.href = '../workshop.html'; };
  } else {
    document.getElementById('btn-next').onclick = () => go(1);
  }
  document.getElementById('nav-dots').innerHTML = SLIDES.map((_, i) => {
    const cls = i === idx ? 'active' : i < idx ? 'done' : '';
    return `<div class="lec-nav__dot ${cls}" onclick="goTo(${i})" title="Slide ${i+1}"></div>`;
  }).join('');
}

function goTo(idx) { if (idx !== current) { current = idx; renderSlide(current); } }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

document.addEventListener('DOMContentLoaded', async () => {
  window.FirebaseApp.init();
  window.AuthService.init();
  const user = await window.AuthService.waitForAuthState();
  if (!user) { window.location.href = '../../auth/login.html'; return; }
  document.getElementById('auth-loading').classList.add('hidden');
  document.getElementById('lecture-shell').classList.add('ready');
  renderSlide(0);
});
</script>
</body>
</html>
