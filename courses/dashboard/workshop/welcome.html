<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | AutoNateAI Workshop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../../shared/js/theme-loader.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #12121a; --bg3: #16162a;
      --text: #e8e8f0; --text2: #a0a0b8; --muted: #6a6a80;
      --purple: #ab47bc; --blue: #7986cb; --teal: #4db6ac;
      --green: #66bb6a; --yellow: #ffd54f; --red: #ef5350; --orange: #ff8a65;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    #auth-loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 1rem; }
    #auth-loading.hidden { display: none; }
    .spin { width: 36px; height: 36px; border: 3px solid rgba(171,71,188,0.3); border-top-color: var(--purple); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #lecture-shell { display: none; height: 100vh; flex-direction: column; }
    #lecture-shell.ready { display: flex; }

    .lec-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: rgba(10,10,15,0.95); border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; backdrop-filter: blur(8px); }
    .lec-bar__back { color: var(--text2); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; transition: color .2s; }
    .lec-bar__back:hover { color: var(--text); }
    .lec-bar__title { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .lec-bar__right { display: flex; align-items: center; gap: 1rem; }
    .lec-bar__section { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .lec-bar__count { font-size: 0.8rem; color: var(--text2); font-family: 'Space Grotesk', sans-serif; }

    .lec-progress { height: 3px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
    .lec-progress__fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width .4s cubic-bezier(.4,0,.2,1); }

    .lec-stage { flex: 1; overflow: hidden; position: relative; }
    #slide-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .lec-nav { display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 1rem 1.5rem; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .lec-nav__btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: 10px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: var(--text2); transition: all .2s; }
    .lec-nav__btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
    .lec-nav__btn.primary { background: var(--teal); border-color: var(--teal); color: #0a0a0f; }
    .lec-nav__btn.primary:hover { opacity: .85; }
    .lec-nav__btn:disabled { opacity: .3; cursor: default; }
    .lec-nav__dots { display: flex; gap: 0.4rem; align-items: center; }
    .lec-nav__dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; transition: all .2s; }
    .lec-nav__dot.active { background: var(--teal); transform: scale(1.3); }
    .lec-nav__dot.done { background: rgba(77,182,172,0.4); }

    /* ── SLIDE TYPES ── */
    .slide { max-width: 820px; width: 100%; }

    /* Title */
    .slide--title { text-align: center; }
    .slide--title .eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 1.5rem; }
    .slide--title .big-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 0.75rem; }
    .slide--title .subtitle { font-size: 1.2rem; color: var(--text2); margin-bottom: 0.5rem; }
    .slide--title .tagline { font-size: 0.9rem; color: var(--muted); margin-bottom: 2.5rem; }
    .mapper-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .mapper-pill { padding: 0.5rem 1rem; border-radius: 8px; background: rgba(77,182,172,0.1); border: 1px solid rgba(77,182,172,0.25); }
    .mapper-pill__char { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--teal); display: block; text-align: center; }
    .mapper-pill__word { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; text-align: center; }

    /* Agenda */
    .slide--agenda .headline { font-family: 'Space Grotesk', sans-serif; font-size: 1.9rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
    .agenda-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .agenda-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 0.875rem; align-items: center; padding: 0.65rem 1rem; background: var(--bg3); border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; }
    .agenda-row.highlight { border-color: rgba(77,182,172,0.3); background: rgba(77,182,172,0.05); }
    .agenda-row.is-break { opacity: 0.45; }
    .agenda-row__time { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .agenda-row__body { display: flex; align-items: center; gap: 0.6rem; }
    .agenda-row__title { font-size: 0.83rem; color: var(--text2); }
    .agenda-row.highlight .agenda-row__title { color: var(--text); font-weight: 500; }
    .agenda-badge { font-size: 0.58rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 0.14rem 0.45rem; border-radius: 4px; border: 1px solid; flex-shrink: 0; }
    .badge-lecture { color: var(--purple); border-color: var(--purple); background: rgba(171,71,188,0.08); }
    .badge-build { color: var(--teal); border-color: var(--teal); background: rgba(77,182,172,0.08); }
    .badge-mini { color: var(--yellow); border-color: var(--yellow); background: rgba(255,213,79,0.08); }
    .badge-debrief { color: var(--red); border-color: var(--red); background: rgba(239,83,80,0.08); }
    .agenda-row__dur { font-size: 0.7rem; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 5px; padding: 0.15rem 0.45rem; white-space: nowrap; }

    /* Arc (What We're Building) */
    .slide--arc .headline { font-family: 'Space Grotesk', sans-serif; font-size: 1.9rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }
    .build-arc { display: grid; grid-template-columns: 1fr 48px 1fr; gap: 1.25rem; align-items: start; }
    .build-arc__arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 2.5rem; gap: 0.3rem; }
    .build-arc__arrow span { color: var(--teal); font-size: 1.5rem; }
    .build-arc__arrow small { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
    .arc-state { background: var(--bg3); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 1.35rem; }
    .arc-state.end { border-color: rgba(102,187,106,0.25); background: rgba(102,187,106,0.04); }
    .arc-state__label { font-size: 0.65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.875rem; }
    .arc-state.end .arc-state__label { color: var(--green); }
    .arc-item { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.83rem; color: var(--text2); margin-bottom: 0.55rem; line-height: 1.4; }
    .arc-item::before { content: '›'; color: var(--muted); flex-shrink: 0; }
    .arc-state.end .arc-item::before { content: '✓'; color: var(--green); }
    .arc-state.end .arc-item { color: var(--text); }

    /* Rule (single statement) */
    .slide--rule { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 320px; gap: 0; }
    .rule-eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }
    .rule-main { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: var(--text); line-height: 1.15; margin-bottom: 1.25rem; }
    .rule-main em { color: var(--teal); font-style: normal; }
    .rule-sub { font-size: 0.95rem; color: var(--text2); max-width: 520px; line-height: 1.75; }
  </style>
</head>
<body>

<div id="auth-loading">
  <div style="font-size:2rem;margin-bottom:.5rem;">👋</div>
  <div class="spin"></div>
</div>

<div id="lecture-shell">
  <div class="lec-bar">
    <a href="../workshop.html" class="lec-bar__back">← Workshop</a>
    <span class="lec-bar__title">Module 00 — Welcome</span>
    <div class="lec-bar__right">
      <span class="lec-bar__section" id="bar-section"></span>
      <span class="lec-bar__count" id="bar-count">1 / 4</span>
    </div>
  </div>
  <div class="lec-progress"><div class="lec-progress__fill" id="progress-fill"></div></div>
  <div class="lec-stage"><div id="slide-wrap"></div></div>
  <nav class="lec-nav">
    <button class="lec-nav__btn" id="btn-prev" onclick="go(-1)">← Prev</button>
    <div class="lec-nav__dots" id="nav-dots"></div>
    <button class="lec-nav__btn primary" id="btn-next" onclick="go(1)">Next →</button>
  </nav>
</div>

<script src="../../shared/js/firebase-config.js"></script>
<script src="../../shared/js/auth.js"></script>
<script>

const SLIDES = [
  {
    id: 's01', type: 'title', section: null,
    data: {
      eyebrow: 'AutoNateAI Workshop · March 21, 2026',
      title: 'Welcome.',
      subtitle: "You're in the right room.",
      tagline: '4 hours. One framework. One live app. Let\'s go.',
      mapper: [
        {char:'M',word:'Map'},{char:'A',word:'Analyze'},{char:'P',word:'Prompt'},
        {char:'P',word:'Preview'},{char:'E',word:'Execute'},{char:'R',word:'Review'}
      ]
    }
  },
  {
    id: 's02', type: 'agenda', section: 'Today',
    data: {
      headline: "Here's how today runs.",
      rows: [
        { time:'10:00 AM', title:'Welcome + Agenda', dur:'5 min', badge:null, highlight:true },
        { time:'10:05 AM', title:'LECTURE: M.A.P.P.E.R. Framework', dur:'30 min', badge:'lecture' },
        { time:'10:35 AM', title:'BUILD: Map the Repo + Frame the Problem', dur:'45 min', badge:'build' },
        { time:'11:20 AM', title:'BUILD: API Server + Data Layer', dur:'45 min', badge:'build' },
        { time:'12:05 PM', title:'Break', dur:'10 min', badge:null, isBreak:true },
        { time:'12:15 PM', title:'BUILD: Intelligence Layer + Claude Predictions', dur:'40 min', badge:'build' },
        { time:'12:55 PM', title:'MINI-LECTURE: Connecting the Dots', dur:'15 min', badge:'mini' },
        { time:'1:10 PM',  title:'BUILD: Frontend + Deploy', dur:'30 min', badge:'build' },
        { time:'1:40 PM',  title:'Debrief + Cognitive Upgrade', dur:'20 min', badge:'debrief' },
      ]
    }
  },
  {
    id: 's03', type: 'arc', section: 'The Build',
    data: {
      headline: 'This is the arc.',
      start: {
        label: 'Where you start',
        items: ['nba_bot.py — monolithic script', 'requirements.txt', 'README.md', 'fetch_today_games() is hardcoded', 'No API server, no frontend, no deploy']
      },
      end: {
        label: 'Where you finish',
        items: ['FastAPI REST server', 'Anthropic Claude structured predictions', 'Live NBA data via The Odds API', 'Frontend of your choice (React / HTML / Streamlit)', 'Deployed → live URL you can share']
      }
    }
  },
  {
    id: 's04', type: 'rule', section: null,
    data: {
      eyebrow: 'The One Rule',
      main: 'Fork before\nyou accept.',
      sub: "The AI will do more than you asked. Every single time. Read the diff. Verify it matches exactly what you asked for — nothing more. That's the one rule. The framework is everything else."
    }
  }
];

let current = 0;

function renderSlide(idx) {
  const s = SLIDES[idx];
  document.getElementById('slide-wrap').innerHTML = slideHTML(s);
  updateBar(idx);
  anime({
    targets: '#slide-wrap > .slide > *',
    opacity: [0, 1], translateY: [18, 0],
    delay: anime.stagger(70), easing: 'easeOutCubic', duration: 380
  });
}

function slideHTML(s) {
  switch (s.type) {
    case 'title':  return titleHTML(s.data);
    case 'agenda': return agendaHTML(s.data);
    case 'arc':    return arcHTML(s.data);
    case 'rule':   return ruleHTML(s.data);
    default: return `<div class="slide"><p>${s.id}</p></div>`;
  }
}

function titleHTML(d) {
  const pills = d.mapper.map(m => `
    <div class="mapper-pill">
      <span class="mapper-pill__char">${m.char}</span>
      <span class="mapper-pill__word">${m.word}</span>
    </div>`).join('');
  return `<div class="slide slide--title">
    <div class="eyebrow">${d.eyebrow}</div>
    <div class="big-title">${d.title}</div>
    <div class="subtitle">${d.subtitle}</div>
    <div class="tagline">${d.tagline}</div>
    <div class="mapper-row">${pills}</div>
  </div>`;
}

function agendaHTML(d) {
  const rows = d.rows.map(r => {
    const badgeHTML = r.badge ? `<span class="agenda-badge badge-${r.badge}">${r.badge === 'mini' ? 'mini-lecture' : r.badge}</span>` : '';
    const cls = [r.highlight ? 'highlight' : '', r.isBreak ? 'is-break' : ''].filter(Boolean).join(' ');
    return `<div class="agenda-row ${cls}">
      <span class="agenda-row__time">${r.time}</span>
      <div class="agenda-row__body">${badgeHTML}<span class="agenda-row__title">${r.title}</span></div>
      <span class="agenda-row__dur">${r.dur}</span>
    </div>`;
  }).join('');
  return `<div class="slide slide--agenda">
    <div class="headline">${d.headline}</div>
    <div class="agenda-list">${rows}</div>
  </div>`;
}

function arcHTML(d) {
  const startItems = d.start.items.map(i => `<div class="arc-item">${i}</div>`).join('');
  const endItems = d.end.items.map(i => `<div class="arc-item">${i}</div>`).join('');
  return `<div class="slide slide--arc">
    <div class="headline">${d.headline}</div>
    <div class="build-arc">
      <div class="arc-state">
        <div class="arc-state__label">${d.start.label}</div>
        ${startItems}
      </div>
      <div class="build-arc__arrow">
        <span>→</span>
        <small>3.5 hrs</small>
      </div>
      <div class="arc-state end">
        <div class="arc-state__label">${d.end.label}</div>
        ${endItems}
      </div>
    </div>
  </div>`;
}

function ruleHTML(d) {
  const lines = d.main.split('\n').join('<br>');
  return `<div class="slide slide--rule">
    <div class="rule-eyebrow">${d.eyebrow}</div>
    <div class="rule-main">${lines}</div>
    <div class="rule-sub">${d.sub}</div>
  </div>`;
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= SLIDES.length) return;
  anime({
    targets: '#slide-wrap > .slide',
    opacity: [1, 0], translateX: [0, dir * -40],
    easing: 'easeInCubic', duration: 200,
    complete() {
      current = next;
      renderSlide(current);
      anime({ targets: '#slide-wrap > .slide', opacity: [0, 1], translateX: [dir * 40, 0], easing: 'easeOutCubic', duration: 280 });
    }
  });
}

function updateBar(idx) {
  const s = SLIDES[idx];
  document.getElementById('progress-fill').style.width = ((idx + 1) / SLIDES.length * 100) + '%';
  document.getElementById('bar-count').textContent = `${idx + 1} / ${SLIDES.length}`;
  document.getElementById('bar-section').textContent = s.section || '';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === SLIDES.length - 1 ? 'Back to Workshop' : 'Next →';
  if (idx === SLIDES.length - 1) {
    document.getElementById('btn-next').onclick = () => { window.location.href = '../workshop.html'; };
  } else {
    document.getElementById('btn-next').onclick = () => go(1);
  }
  document.getElementById('nav-dots').innerHTML = SLIDES.map((_, i) => {
    const cls = i === idx ? 'active' : i < idx ? 'done' : '';
    return `<div class="lec-nav__dot ${cls}" onclick="goTo(${i})" title="Slide ${i+1}"></div>`;
  }).join('');
}

function goTo(idx) { if (idx !== current) { current = idx; renderSlide(current); } }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

document.addEventListener('DOMContentLoaded', async () => {
  window.FirebaseApp.init();
  window.AuthService.init();
  const user = await window.AuthService.waitForAuthState();
  if (!user) { window.location.href = '../../auth/login.html'; return; }
  document.getElementById('auth-loading').classList.add('hidden');
  document.getElementById('lecture-shell').classList.add('ready');
  renderSlide(0);
});
</script>
</body>
</html>
